<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>四柱推命鑑定システム</title>
<style>body{font-family:"Yu Gothic",Meiryo,sans-serif;background:#f7f1e6;color:#171512;margin:0}main{max-width:980px;margin:auto;padding:28px}.box,.section{background:#fffaf1;border:1px solid rgba(23,21,18,.25);padding:18px;margin:16px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:grid;gap:5px;font-weight:700;color:#766b5c}input,select,textarea{padding:10px;border:1px solid rgba(23,21,18,.25);font:inherit}.full{grid-column:1/-1}button{background:#b93425;color:#fff;border:0;padding:10px 14px;font-weight:800}.secondary{background:#fff;color:#842219;border:1px solid #b93425}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.top{display:grid;grid-template-columns:70px 1fr;gap:16px;align-items:center}.seal{width:70px;aspect-ratio:1;border:2px solid #b93425;color:#b93425;display:grid;place-items:center;font-size:30px;font-weight:900}.profile,.result{line-height:1.8}.result{border-left:3px solid #b93425;background:rgba(185,52,37,.08);padding:12px;margin-top:12px}.sheet{overflow:auto;border:2px solid #171512;background:#fffaf1}table{width:100%;border-collapse:collapse;min-width:720px}th,td{border:2px solid #171512;padding:10px;text-align:center}.blue{color:#1877bd;font-weight:900}.red{color:#b93425;font-weight:900}.copy{border:2px solid #b93425;background:rgba(185,52,37,.08);padding:18px;text-align:center;font-size:28px;font-weight:900}.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{border:1px solid rgba(23,21,18,.12);padding:14px;background:#fff}@media(max-width:720px){.grid,.cards{grid-template-columns:1fr}table{min-width:620px}}</style>
</head>
<body><main>
<section class="box"><h2>鑑定入力</h2><div class="grid"><label>名前<input id="clientName" placeholder="例：山田太郎"></label><label>性別<select id="clientGender"><option value="" selected>未選択</option><option>男性</option><option>女性</option><option>その他</option></select></label><label>生年月日<input id="birthDate" type="date"></label><label>出生時刻<input id="birthTime" type="time"></label><label class="full">出生地<input id="birthPlace" placeholder="例：千葉"></label><label class="full">鑑定メモ<textarea id="readingMemo" placeholder="相談内容、次回見るポイント、鑑定中の気づき"></textarea></label></div><div class="actions"><button id="applyReading">鑑定に反映</button><button id="saveReading">鑑定結果を保存</button><button class="secondary" id="clearForm">入力を戻す</button></div><div class="result" id="systemNotice">生年月日を入力すると、鑑定書上部に反映されます。</div></section>
<section class="box"><h2>保存・相性</h2><div id="savedReadings"></div><div class="grid"><label>相手の名前<input id="partnerName" placeholder="相手の名前"></label><label>相手の性別<select id="partnerGender"><option selected>未指定</option><option>男性</option><option>女性</option><option>その他</option></select></label><label>相手の生年月日<input id="partnerDate" type="date"></label><label>相手の出生時刻<input id="partnerTime" type="time"></label></div><div class="actions"><button id="checkCompatibility">相性を見る</button><button class="secondary" id="deleteSelected">選択中を削除</button></div><div class="result" id="compatibilityResult">相手の情報を入れると、命式ベースの相性メモを表示します。</div></section>
<header class="top"><div class="seal">庚</div><div><h1 id="titleName">鑑定結果</h1><p class="profile" id="profileLine">生年月日・出生時刻・出生地を入力してください</p></div></header>
<div class="sheet"><table><tr><th>天中殺</th><th>時柱</th><th>日柱</th><th>月柱</th><th>年柱</th><th></th></tr><tr><td class="blue" rowspan="5">子丑</td><td class="blue">癸 未</td><td class="blue">庚 申</td><td class="blue">乙 酉</td><td class="blue">乙 丑</td><td>干支</td></tr><tr><td class="blue">乙</td><td class="blue">戊</td><td class="blue">庚</td><td class="blue">辛</td><td>蔵干</td></tr><tr><td class="blue">傷官</td><td></td><td class="blue">正財</td><td class="blue">正財</td><td>通変星</td></tr><tr><td class="blue">正財</td><td class="red">偏印</td><td class="blue">比肩</td><td class="blue">劫財</td><td>蔵干通変星</td></tr><tr><td class="blue">冠帯</td><td class="blue">建禄</td><td class="blue">帝旺</td><td class="blue">墓</td><td>十二運星</td></tr></table></div>
<div class="copy">あなたは<span class="red">未来を鍛える戦略家</span>です</div>
<section class="section"><h2>命式の解説</h2><p>日柱が <b class="blue">庚申</b> のあなたは、月令酉で帝旺、日支申で建禄に乗る、かなり強い庚金の命式です。</p></section>
<section class="section"><h2>専門判定</h2><div class="cards"><div class="card"><h3>身旺・身強</h3><p>庚日主が酉月に生まれ、日支申に通根。</p></div><div class="card"><h3>干合・支合</h3><p>乙庚干合が二重。支合はなし。</p></div></div></section>
</main><script>
const key="suimei-reading-records";let selected=null;const $=id=>document.getElementById(id);const f={name:$("clientName"),gender:$("clientGender"),date:$("birthDate"),time:$("birthTime"),place:$("birthPlace"),memo:$("readingMemo"),notice:$("systemNotice"),saved:$("savedReadings"),partnerName:$("partnerName"),partnerGender:$("partnerGender"),partnerDate:$("partnerDate"),partnerTime:$("partnerTime"),compat:$("compatibilityResult")};function wd(d){if(!d)return"";return["日曜日","月曜日","火曜日","水曜日","木曜日","金曜日","土曜日"][new Date(d+"T00:00:00").getDay()]}function fd(d){if(!d)return"";const [y,m,day]=d.split("-");return `${y}年 ${m}月 ${day}日`}function rec(){return{id:selected||String(Date.now()),name:f.name.value.trim(),gender:f.gender.value,date:f.date.value,time:f.time.value,place:f.place.value.trim(),memo:f.memo.value.trim()}}function dn(r){return r.name||"あなた"}function profile(r){const p=[fd(r.date),r.time?`${r.time} 生まれ`:"",wd(r.date),r.place,r.gender].filter(Boolean);return p.length?p.join("　"):"生年月日・出生時刻・出生地を入力してください"}function list(){try{return JSON.parse(localStorage.getItem(key)||"[]")}catch{return[]}}function setList(v){localStorage.setItem(key,JSON.stringify(v))}function apply(){const r=rec();$("titleName").textContent=r.name?`${r.name} 様　鑑定結果`:"鑑定結果";$("profileLine").textContent=profile(r);f.notice.textContent=r.date?"入力した生年月日を鑑定書上部に反映しました。":"生年月日を入力すると、鑑定書上部に反映されます。"}function render(){const l=list();f.saved.innerHTML=l.length?"":"<p>保存された鑑定はまだありません。</p>";l.forEach(r=>{const b=document.createElement("button");b.className="secondary";b.textContent=`${r.name||"無記名"} 様 / ${profile(r)}`;b.onclick=()=>{selected=r.id;f.name.value=r.name||"";f.gender.value=r.gender||"";f.date.value=r.date||"";f.time.value=r.time||"";f.place.value=r.place||"";f.memo.value=r.memo||"";apply();render()};f.saved.appendChild(b)})}function save(){const r=rec();const n=list().filter(x=>x.id!==r.id);n.unshift(r);setList(n.slice(0,20));selected=r.id;render();f.notice.textContent=`${r.name||"無記名"}さんの鑑定結果とメモを保存しました。`}function del(){if(!selected){f.notice.textContent="削除する鑑定を保存一覧から選んでください。";return}setList(list().filter(x=>x.id!==selected));selected=null;render()}function reset(){selected=null;f.name.value="";f.gender.value="";f.date.value="";f.time.value="";f.place.value="";f.memo.value="";f.partnerName.value="";f.partnerGender.value="未指定";f.partnerDate.value="";f.partnerTime.value="";f.compat.textContent="相手の情報を入れると、命式ベースの相性メモを表示します。";apply();render()}function compat(){const p=f.partnerName.value.trim()||"相手";const r=rec();const dt=f.partnerDate.value?`${fd(f.partnerDate.value)}生まれ`:"生年月日未入力";f.compat.innerHTML=`<b>${dn(r)}さん × ${p}さん</b><br>${p}さんは${dt}・${f.partnerGender.value}。<br>${dn(r)}さんは庚金身旺で判断力が強いため、相性では「相手が安心して話せる余白」を作るほど良縁化します。`}$("applyReading").onclick=apply;$("saveReading").onclick=save;$("clearForm").onclick=reset;$("deleteSelected").onclick=del;$("checkCompatibility").onclick=compat;reset();
</script></body></html>
